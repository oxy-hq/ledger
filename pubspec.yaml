name: ledger
description: "Generic CRUD mobile app driven by YAML schemas"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  yaml: ^3.1.2
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.yaml
    - assets/service-account.json
    - assets/schemas/
