name: airledger
description: "Schema-driven mobile CRUD app — the input layer of the air* stack"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  yaml: ^3.1.2
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  jinja: ^0.6.6
  shared_preferences: ^2.5.5
  sqflite: ^2.4.0
  ffi: ^2.1.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  lucide_icons_flutter: ^3.0.0
  postgres: ^3.5.0
  mysql_client: ^0.0.27
  airlayer:
    path: ../airlayer/sdk-dart
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.yaml
    - assets/service-account.json
    - assets/schemas/
    - assets/apps/
